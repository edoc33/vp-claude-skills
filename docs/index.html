<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --text: #2d2d3a;
    --text-secondary: #64647a;
    --surface: #faf9f7;
    --surface-warm: #f4f2ee;
    --white: #ffffff;
    --border: #e8e6e1;
    --blue: #0B51AE;
    --blue-light: #1882FF;
    --green: #1a7a4f;
    --green-bg: #e8f5ee;
    --amber: #b45309;
    --amber-bg: #fef3e2;
    --red: #b91c1c;
    --red-bg: #fde8e8;
    --blue-bg: #e8f0fd;
    --cat-content: #6d28d9;
    --cat-content-bg: #f3edff;
    --cat-seo: #0d6e6e;
    --cat-seo-bg: #e6f5f5;
    --cat-design: #be185d;
    --cat-design-bg: #fde8f0;
    --cat-infra: #4a5568;
    --cat-infra-bg: #edf0f4;
    --cat-outbound: #c2410c;
    --cat-outbound-bg: #fff1e6;
    --cat-ads: #7c3aed;
    --cat-ads-bg: #f0e8ff;
    --cat-launch: #0369a1;
    --cat-launch-bg: #e4f1fb;
    --cat-sales: #047857;
    --cat-sales-bg: #e6f7f0;
    --cat-data: #6b5b3e;
    --cat-data-bg: #f5f0e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: var(--text); background: var(--surface);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  /* --- Header --- */
  .header {
    background: var(--ink); color: var(--surface);
    padding: 40px 40px 36px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px; font-weight: 700;
    letter-spacing: -0.5px; line-height: 1.1;
  }
  .header .meta {
    font-size: 13px; opacity: 0.45;
    margin-top: 6px; font-weight: 400;
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .header .tier-summary {
    margin-top: 20px; display: flex; gap: 32px; flex-wrap: wrap;
    padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .header .tier-summary span {
    display: flex; flex-direction: column; gap: 2px;
  }
  .header .tier-summary .count {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 28px;
    letter-spacing: -0.5px; line-height: 1;
  }
  .header .tier-summary .tier-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; opacity: 0.5; font-weight: 500;
  }

  /* --- Controls --- */
  .controls {
    padding: 24px 40px 20px; display: flex;
    gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .controls select, .controls input {
    padding: 9px 14px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px;
    background: var(--white); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s ease;
  }
  .controls select:focus, .controls input:focus {
    outline: 2px solid var(--blue); outline-offset: -1px;
    border-color: var(--blue);
  }
  .controls select { cursor: pointer; }
  .controls input { width: 260px; }
  .controls .shortcut-hint {
    font-size: 11px; color: var(--text-secondary);
    margin-left: 4px; opacity: 0.6;
  }

  /* --- Sections --- */
  .section-head {
    padding: 32px 40px 14px;
    display: flex; align-items: baseline; gap: 12px;
  }
  .section-head h2 {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink); font-size: 18px; font-weight: 700;
    letter-spacing: -0.3px;
  }
  .section-head .summary {
    font-size: 13px; color: var(--text-secondary);
  }

  /* --- Tables --- */
  .table-wrap { padding: 0 40px 40px; }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--white);
  }
  th {
    padding: 11px 16px; text-align: left;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-secondary);
    user-select: none; white-space: nowrap;
    border-bottom: 2px solid var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    transition: color 0.15s ease;
  }
  th[data-col] { cursor: pointer; }
  th[data-col]:hover { color: var(--ink); }
  th.sorted-asc::after { content: " \u25B2"; font-size: 9px; }
  th.sorted-desc::after { content: " \u25BC"; font-size: 9px; }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  tr:last-child td { border-bottom: none; }
  tr { transition: background-color 0.1s ease; }
  tr:hover td { background: var(--surface-warm); }
  tr.hidden { display: none; }

  /* Skill name — the most important column */
  td:first-child strong {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 14px;
    letter-spacing: -0.2px; color: var(--ink);
  }

  /* Uses column — tabular numbers */
  td:nth-child(3) {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-variant-numeric: tabular-nums;
    letter-spacing: -0.3px;
  }

  /* --- Badges --- */
  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    font-family: 'Space Grotesk', sans-serif;
  }
  .badge.active { background: var(--green-bg); color: var(--green); }
  .badge.recent { background: var(--blue-bg); color: var(--blue); }
  .badge.stale { background: var(--amber-bg); color: var(--amber); }
  .badge.never { background: var(--red-bg); color: var(--red); }

  .badge-cat {
    display: inline-block; padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    font-family: 'Space Grotesk', sans-serif;
  }
  .badge-cat[data-cat="Content"] { background: var(--cat-content-bg); color: var(--cat-content); }
  .badge-cat[data-cat="SEO"] { background: var(--cat-seo-bg); color: var(--cat-seo); }
  .badge-cat[data-cat="Design"] { background: var(--cat-design-bg); color: var(--cat-design); }
  .badge-cat[data-cat="Infra"] { background: var(--cat-infra-bg); color: var(--cat-infra); }
  .badge-cat[data-cat="Outbound"] { background: var(--cat-outbound-bg); color: var(--cat-outbound); }
  .badge-cat[data-cat="Ads"] { background: var(--cat-ads-bg); color: var(--cat-ads); }
  .badge-cat[data-cat="Launch"] { background: var(--cat-launch-bg); color: var(--cat-launch); }
  .badge-cat[data-cat="Sales"] { background: var(--cat-sales-bg); color: var(--cat-sales); }
  .badge-cat[data-cat="Data"] { background: var(--cat-data-bg); color: var(--cat-data); }

  /* --- Channel dots --- */
  .channel { font-size: 12px; color: var(--text-secondary); }
  .channel .dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; margin-right: 5px;
  }
  .channel .dot.interactive { background: var(--blue-light); }
  .channel .dot.automated { background: var(--green); }
  .channel .dot.both { background: var(--amber); }
  .channel .dot.never { background: #D1D5DB; }

  /* --- Group headers --- */
  .category-header {
    padding: 14px 16px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--ink); background: var(--surface-warm);
    cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .category-header:hover { background: var(--border); }
  .category-header .toggle {
    float: right; font-size: 11px;
    color: var(--text-secondary); font-weight: 500;
  }

  /* --- n8n table --- */
  .n8n-rate { font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
  .n8n-rate.good { color: var(--green); }
  .n8n-rate.warn { color: var(--amber); }
  .n8n-rate.bad { color: var(--red); }
  .n8n-meta { color: var(--text-secondary); font-size: 12px; }
  .n8n-last { color: var(--text-secondary); font-size: 13px; }

  /* --- Muted placeholder --- */
  .muted { color: var(--border); }

  /* --- Section divider --- */
  .section-divider {
    margin: 0 40px; border: none;
    border-top: 1px solid var(--border);
  }

  /* --- Empty state --- */
  .empty-state {
    padding: 48px 40px; text-align: center;
    color: var(--text-secondary); font-size: 14px;
  }

  /* --- Entrance animation --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  tbody tr {
    animation: fadeUp 0.3s ease-out both;
  }
  @media (prefers-reduced-motion: reduce) {
    tbody tr { animation: none; }
  }

  /* --- Tablet (< 1024px) --- */
  @media (max-width: 1023px) {
    .header { padding: 32px 24px 28px; }
    .header h1 { font-size: 28px; }
    .header .tier-summary { gap: 24px; }
    .header .tier-summary .count { font-size: 24px; }
    .controls { padding: 20px 24px 16px; }
    .section-head { padding: 28px 24px 12px; }
    .table-wrap { padding: 0 24px 32px; }
    .section-divider { margin: 0 24px; }
    .empty-state { padding: 40px 24px; }
  }

  /* --- Mobile (< 640px) --- */
  @media (max-width: 639px) {
    .header { padding: 24px 16px 22px; }
    .header h1 { font-size: 22px; letter-spacing: -0.3px; }
    .header .meta { font-size: 12px; }
    .header .tier-summary {
      gap: 0; margin-top: 16px; padding-top: 16px;
      display: grid; grid-template-columns: repeat(3, 1fr);
      row-gap: 14px;
    }
    .header .tier-summary .count { font-size: 22px; }
    .header .tier-summary .tier-label { font-size: 10px; }

    .controls {
      padding: 16px; gap: 8px;
      flex-direction: column; align-items: stretch;
    }
    .controls input { width: 100%; }
    .controls select { width: 100%; }
    .controls .shortcut-hint { display: none; }

    .section-head { padding: 24px 16px 10px; flex-direction: column; gap: 4px; }
    .section-head h2 { font-size: 16px; }

    .table-wrap {
      padding: 0 16px 24px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    table { min-width: 520px; }

    th { padding: 9px 12px; font-size: 9px; letter-spacing: 1px; }
    td { padding: 10px 12px; font-size: 13px; }
    td:first-child strong { font-size: 13px; }

    .badge { padding: 2px 7px; font-size: 9px; }
    .badge-cat { padding: 2px 7px; font-size: 9px; }

    .section-divider { margin: 0 16px; }
    .empty-state { padding: 32px 16px; font-size: 13px; }
  }

  /* --- Small mobile (< 380px) --- */
  @media (max-width: 379px) {
    .header .tier-summary { grid-template-columns: repeat(2, 1fr); }
    .header .tier-summary .count { font-size: 20px; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>

<div class="header">

  <div class="meta" id="meta"></div>
  <div class="tier-summary" id="tier-summary"></div>
</div>

<div class="controls">

  <select id="catFilter">

  </select>
  <select id="groupBy">

    <option value="category">Group by category</option>
    <option value="tier">Group by tier</option>

</div>

<div id="n8n-section">

  </div>
  <div class="table-wrap">
    <table>

        <th>Status</th>
        <th>Runs (last 20)</th>
        <th>Success Rate</th>
        <th>Avg Duration</th>
        <th>Last Run</th>
      </tr></thead>
      <tbody id="n8n-tbody"></tbody>
    </table>
  </div>
</div>

<hr class="section-divider">

<div class="section-head">
  <h2>Claude Skills</h2>
  <span class="summary" id="skills-summary"></span>
</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th data-col="skill">Skill</th>

      <th data-col="total_uses" data-type="num">Uses</th>
      <th data-col="last_used">Last Used</th>
      <th data-col="channel">Channel</th>
      <th data-col="tier">Tier</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

      "successes": 0,
      "errors": 0,
      "success_rate": 0,
      "last_run": "never",
      "avg_duration_s": 0
    },
    {
      "name": "Firehose Collector",
      "id": "WNIzIkL63sLdZMkk",
      "active": true,
      "total_runs": 6,
      "successes": 6,
      "errors": 0,
      "success_rate": 100,
      "last_run": "2026-03-18T05:15:00",
      "avg_duration_s": 1.2
    },
    {
      "name": "Monthly Trends Collector",
      "id": "nM4h7u7dg5QiTBFs",
      "active": true,
      "total_runs": 0,
      "successes": 0,
      "errors": 0,
      "success_rate": 0,
      "last_run": "never",
      "avg_duration_s": 0
    }
  ],
  "n8n_count": 15,
  "n8n_active": 15
}</script>

<script>
const data = JSON.parse(document.getElementById('data').textContent);
const skills = data.skills;

// Header meta
document.getElementById('meta').textContent =
  `Scanned ${data.scan_date}`;

// Tier summary in header
const tc = data.tier_counts;
const tierItems = [
  [data.total_skills, 'total'],
  [tc.active, 'active'],
  tc.recent ? [tc.recent, 'recent'] : null,
  tc.stale ? [tc.stale, 'stale'] : null,
  [tc.never, 'unused'],
  [data.n8n_count || 0, 'workflows'],
].filter(Boolean);
document.getElementById('tier-summary').innerHTML = tierItems
  .map(([v, l]) => `<span><span class="count">${v}</span><span class="tier-label">${l}</span></span>`)
  .join('');

// n8n section
const n8n = data.n8n_workflows || [];
if (n8n.length > 0) {
  const activeCount = n8n.filter(w => w.active).length;
  const totalRuns = n8n.reduce((s, w) => s + w.total_runs, 0);
  const totalErrors = n8n.reduce((s, w) => s + w.errors, 0);
  document.getElementById('n8n-summary').textContent =
    `${activeCount} active \u00B7 ${totalRuns} runs \u00B7 ${totalErrors} errors`;

  document.getElementById('n8n-tbody').innerHTML = n8n
    .sort((a, b) => b.total_runs - a.total_runs)
    .map(w => {
      const noRuns = w.total_runs === 0;
      const rateClass = noRuns ? '' : w.success_rate >= 90 ? 'good' : w.success_rate >= 70 ? 'warn' : 'bad';
      const rateStr = noRuns ? '<span class="muted">\u2014</span>' : `<span class="n8n-rate ${rateClass}">${w.success_rate}%</span>`;
      const dur = noRuns ? '<span class="muted">\u2014</span>' : w.avg_duration_s < 60 ? `${w.avg_duration_s}s` : `${(w.avg_duration_s/60).toFixed(1)}m`;
      const lastRun = w.last_run === 'never' ? '<span class="muted">\u2014</span>' : w.last_run.replace('T', ' ');
      return `<tr>
        <td><strong>${w.name}</strong></td>
        <td>${w.active ? '\u{1F7E2}' : '\u26AA'}</td>
        <td>${noRuns ? '<span class="muted">\u2014</span>' : `${w.total_runs} <span class="n8n-meta">(${w.successes}\u2713 ${w.errors}\u2717)</span>`}</td>
        <td>${rateStr}</td>
        <td>${dur}</td>
        <td class="n8n-last">${lastRun}</td>
      </tr>`;
    }).join('');
} else {
  document.getElementById('n8n-section').style.display = 'none';
}

// Skills summary
const totalUses = skills.reduce((s, sk) => s + sk.total_uses, 0);
document.getElementById('skills-summary').textContent =
  `${totalUses} total uses across ${skills.length} skills`;

// Category filter options
const cats = [...new Set(skills.map(s => s.category))].sort();
const catSel = document.getElementById('catFilter');
cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });

// Render table
const tbody = document.getElementById('tbody');
let sortCol = 'total_uses', sortDir = 'desc';

function renderRows() {
  const search = document.getElementById('search').value.toLowerCase();
  const tierF = document.getElementById('tierFilter').value;
  const catF = document.getElementById('catFilter').value;
  const groupBy = document.getElementById('groupBy').value;

  let filtered = skills.filter(s => {
    if (search && !s.skill.includes(search) && !s.category.toLowerCase().includes(search)) return false;
    if (tierF !== 'all' && s.tier !== tierF) return false;
    if (catF !== 'all' && s.category !== catF) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'total_uses' || sortCol === 'interactive_count') {
      va = va || 0; vb = vb || 0;
      return sortDir === 'asc' ? va - vb : vb - va;
    }
    va = va || ''; vb = vb || '';
    return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  // Group
  let html = '';
  if (groupBy !== 'none') {
    const groups = {};
    filtered.forEach(s => {
      const key = groupBy === 'category' ? s.category : s.tier;
      if (!groups[key]) groups[key] = [];
      groups[key].push(s);
    });
    const groupOrder = groupBy === 'tier'
      ? ['active','recent','stale','never']
      : Object.keys(groups).sort();
    groupOrder.forEach(g => {
      if (!groups[g]) return;
      html += `<tr class="category-header"><td colspan="6">${g.charAt(0).toUpperCase() + g.slice(1)} <span class="toggle">${groups[g].length}</span></td></tr>`;
      groups[g].forEach(s => { html += rowHTML(s); });
    });
  } else {
    filtered.forEach(s => { html += rowHTML(s); });
  }

  if (!html) {
    html = '<tr><td colspan="6" class="empty-state">No skills match your filters.</td></tr>';
  }

  tbody.innerHTML = html;
  staggerRows();
}

function rowHTML(s) {
  const lastStr = s.last_used || '<span class="muted">\u2014</span>';
  return `<tr>
    <td><strong>${s.skill}</strong></td>
    <td><span class="badge-cat" data-cat="${s.category}">${s.category}</span></td>
    <td>${s.total_uses}</td>
    <td>${lastStr}</td>
    <td><span class="channel"><span class="dot ${s.channel}"></span>${s.channel}</span></td>
    <td><span class="badge ${s.tier}">${s.tier}</span></td>
  </tr>`;
}

// Sort headers
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
    else { sortCol = col; sortDir = col === 'total_uses' ? 'desc' : 'asc'; }
    document.querySelectorAll('th').forEach(t => { t.classList.remove('sorted-asc','sorted-desc'); t.removeAttribute('aria-sort'); });
    th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    th.setAttribute('aria-sort', sortDir === 'asc' ? 'ascending' : 'descending');
    renderRows();
  });
});

// Filters
document.getElementById('search').addEventListener('input', renderRows);
document.getElementById('tierFilter').addEventListener('change', renderRows);
document.getElementById('catFilter').addEventListener('change', renderRows);
document.getElementById('groupBy').addEventListener('change', renderRows);

// Stagger animation (cap at 800ms total)
function staggerRows() {
  const rows = document.querySelectorAll('tbody tr:not(.category-header)');
  const step = rows.length > 40 ? Math.floor(800 / rows.length) : 20;
  rows.forEach((tr, i) => {
    tr.style.animationDelay = `${i * step}ms`;
  });
}

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
  }
});

// Initial render
const initSortTh = document.querySelector('th[data-col="total_uses"]');
initSortTh.classList.add('sorted-desc');
initSortTh.setAttribute('aria-sort', 'descending');
renderRows();
staggerRows();
</script>
</body>
</html>
